
services:
  # The API and ML Engine (Sentinel-Fin)
  api:
    build: .
    container_name: sentinel_api
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sentinel_network

  # The Audit Log Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel_network

  # Local AI Model Server (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: sentinel_ollama
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - sentinel_network

networks:
  sentinel_network:
    driver: bridge

volumes:
  postgres_data:
  ollama_storage: