services:
  # 1. The API and ML Engine
  api:
    build: .
    container_name: sentinel_api
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sentinel_network

  # 2. NEW: The Sentinel Dashboard (Frontend)
  frontend:
    build: .
    container_name: sentinel_frontend
    volumes:
      - .:/app
    # We override the default command to start Streamlit
    command: streamlit run src/frontend/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      - api
    networks:
      - sentinel_network

  # 3. The Audit Log Database
  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel_network

  # 4. Local AI Model Server
  ollama:
    image: ollama/ollama:latest
    container_name: sentinel_ollama
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - sentinel_network

networks:
  sentinel_network:
    driver: bridge

volumes:
  postgres_data:
  ollama_storage: